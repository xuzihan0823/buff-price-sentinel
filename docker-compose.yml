services:
  buff-sentinel:
    image: ${IMAGE_REF:?IMAGE_REF must reference a fixed GHCR image digest}
    container_name: buff-price-sentinel
    restart: unless-stopped
    environment:
      - TZ=${TZ:-Asia/Shanghai}
      - BUFF_SENTINEL_CONFIG_DIR=/app/config
      - LLM_API_KEY=${LLM_API_KEY:?LLM_API_KEY is required}
      - QQ_APP_ID=${QQ_APP_ID:?QQ_APP_ID is required}
      - QQ_CLIENT_SECRET=${QQ_CLIENT_SECRET:?QQ_CLIENT_SECRET is required}
      - QQ_RECIPIENT_OPENID=${QQ_RECIPIENT_OPENID:?QQ_RECIPIENT_OPENID is required}
      - BUFF_SESSION_COOKIE=${BUFF_SESSION_COOKIE:-}
    volumes:
      - ./config:/app/config:ro
      - buff-price-sentinel-data:/app/data
    healthcheck:
      test: ["CMD", "buff-sentinel", "healthcheck", "--config-dir", "/app/config"]
      interval: 5m
      timeout: 15s
      retries: 3
      start_period: 10m

volumes:
  buff-price-sentinel-data:
    name: buff-price-sentinel-data
