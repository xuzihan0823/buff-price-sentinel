# Owned + wishlist goods definitions (1-100 items total).
# Copy to items.yaml and edit. Real config is gitignored.

# Owned entries can use relative P/L percentages, an absolute upward crossing,
# or both. `alert_above_price` fires only when sell_min moves from below the
# threshold to the threshold or above; staying above does not repeat the alert.
owned:
  - goods_id: 762000
    name: "AK-47 | Redline (FT)"
    purchase_price: 105.50
    profit_pct: 15.0
    loss_pct: 10.0
    alert_above_price: 150.0
  - goods_id: 762001
    name: "AK-47 | Redline (MW)"
    purchase_price: 145.00
    profit_pct: 15.0
    loss_pct: 10.0
  - goods_id: 762002
    name: "M4A4 | Neo-Noir (FT)"
    purchase_price: 120.00
    profit_pct: 15.0
    loss_pct: 10.0
  - goods_id: 762003
    name: "M4A1-S | Player Two (FT)"
    purchase_price: 98.00
    profit_pct: 15.0
    loss_pct: 10.0
  - goods_id: 762004
    name: "USP-S | Cortex (FT)"
    purchase_price: 35.00
    profit_pct: 15.0
    loss_pct: 10.0

# Wishlist entries: trigger on target floor price, 24h drop, or 24h rise.
# Each item is analyzed at least once every `collection.wishlist_review_days`.
wishlist:
  - goods_id: 776543
    name: "AWP | Asiimov (FT)"
    target_price: 220.00      # fire when sell_min <= target
    drop_pct_24h: 8.0         # fire when 24h change <= -8%
    rise_pct_24h: 12.0        # fire when 24h change >= +12%
  - goods_id: 776544
    name: "AK-47 | Vulcan (FT)"
    target_price: 180.00
  - goods_id: 776545
